name: Compile SuperTank
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 下载 SourceMod 1.12 编译器
      - name: Setup SourceMod
        run: |
          wget -O sourcemod.tar.gz https://sm.alliedmods.net/smdrop/1.12/sourcemod-1.12.0-git6942-linux.tar.gz
          tar -xzf sourcemod.tar.gz

      # 编译插件（直接用 -i 参数指定 include 目录）
      - name: Compile plugin
        run: |
          ./addons/sourcemod/scripting/spcomp SuperTank.sp \
            -i ./addons/sourcemod/scripting/include/ \
            -o SuperTank.smx

      # 上传编译好的 smx 文件
      - name: Upload compiled plugin
        uses: actions/upload-artifact@v4
        with:
          name: SuperTank.smx
          path: SuperTank.smx
