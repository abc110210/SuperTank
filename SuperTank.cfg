// 寄寄之家 - SuperTank 配置文件
// 输入 !supertank 指令，打开生成 Tank 系统

// 全局属性，所有Tank属性都会在这里生效

// Tank动态生命值
// 从各个难度基础血量加上 (此值 × 玩家数量)
// 这个值是服务器每一名玩家给Tank加多少血量
shan_tank_hp "4000"

// Tank 拳头伤害值
// 原版伤害值为24，伤害值可以从 1 ~ 1000
shan_tank_damage "24"

// ==================== 金刚Tank配置 ====================
// 金刚Tank生成概率 (0-100)
// 概率最大是100，设置100的时候，其他的概率都要设置为0
// 如果全部合起来的概率没有到100，那剩下的概率就是普通Tank的生成概率
shan_Vajra_odds "10"

// 金刚Tank反弹概率 (0-100)
shan_Vajra_reflect "10"

// 反弹伤害随机值
// 假如值为 10 ，那么Tank反弹伤害就是 10 ~ 20
// 假如值为 18 ，那么Tank反弹伤害就是 18 ~ 36
// 最小值为 1 最大值为 100
shan_Vajra_reflect_damage "3"

// ==================== 爆炸Tank配置 ====================
// 爆炸Tank生成概率 (0-100)
shan_ExplodeTank_odds "90"

// 爆炸Tank爆炸概率
// 只能填 (1 ~ 100) 100的时候每一发都是爆炸
shan_ExplodeTank_explosion_random "100"

// 爆炸Tank爆炸伤害 (0-500)
shan_ExplodeTank_explosion_damage "50"
