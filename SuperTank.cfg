// 超级Tank，可以有多种多样的Tank

// 设置Tank伤害，拳头伤害
// 默认24 ，范围 1 ~ 100
shan_tank_dagame "24"

// Tank动态生命值
// 从各个难度加上这个值
// 这个值是服务器每一名玩家给Tank加多少血量
shan_tank_hp "4000"

// 启用或者禁用金刚Tank
// 1 为启动 0 为关闭
shan_Vajra_enabled "1"
// 生成概率 1~100
shan_Vajra_odds "10"
// 金刚Tank技能
// 反弹子弹概率
// 1~100，概率是百分比
shan_Vajra_Tank "40"